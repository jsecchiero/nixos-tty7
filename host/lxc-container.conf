# NixOS LXC container configuration with full device passthrough
# https://github.com/jsecchiero/nixos-tty7

# Container name
lxc.uts.name = nixos

# Root filesystem
lxc.rootfs.path = /var/lib/machines/nixos

# Init command
lxc.init.cmd = /sbin/init

# Architecture
lxc.arch = x86_64

# Use host network namespace (container shares host's network)
lxc.net.0.type = none

# Autostart container on boot
lxc.start.auto = 1

# TTY and console
# Note: tty.max must be <= 6 when bind-mounting tty7 from host
# LXC creates /dev/tty1-6, and we bind-mount the host's /dev/tty7
lxc.tty.max = 6
lxc.pty.max = 1024

# Capabilities to drop (security)
lxc.cap.drop = mac_admin mac_override sys_time sys_module sys_rawio

# =============================================================================
# CGROUP DEVICE PERMISSIONS
# =============================================================================

# Deny all by default
lxc.cgroup2.devices.deny = a

# Allow mknod for all char/block devices (needed for device creation)
lxc.cgroup2.devices.allow = c *:* m
lxc.cgroup2.devices.allow = b *:* m

# Standard devices
lxc.cgroup2.devices.allow = c 1:3 rwm    # /dev/null
lxc.cgroup2.devices.allow = c 1:5 rwm    # /dev/zero
lxc.cgroup2.devices.allow = c 1:7 rwm    # /dev/full
lxc.cgroup2.devices.allow = c 1:8 rwm    # /dev/random
lxc.cgroup2.devices.allow = c 1:9 rwm    # /dev/urandom
lxc.cgroup2.devices.allow = c 5:0 rwm    # /dev/tty
lxc.cgroup2.devices.allow = c 5:1 rwm    # /dev/console
lxc.cgroup2.devices.allow = c 5:2 rwm    # /dev/ptmx
lxc.cgroup2.devices.allow = c 136:* rwm  # /dev/pts/*
lxc.cgroup2.devices.allow = c 10:229 rwm # /dev/fuse
lxc.cgroup2.devices.allow = c 1:11 rwm   # /dev/kmsg (required by Kubernetes kubelet)

# TTY devices (major 4) - for virtual terminals
lxc.cgroup2.devices.allow = c 4:* rwm

# GPU/DRI devices (major 226) - for graphics acceleration
lxc.cgroup2.devices.allow = c 226:* rwm

# Input devices (major 13) - keyboard, mouse, touchpad, etc.
lxc.cgroup2.devices.allow = c 13:* rwm

# Sound devices (major 116) - ALSA
lxc.cgroup2.devices.allow = c 116:* rwm

# Video4Linux devices (major 81) - webcams
lxc.cgroup2.devices.allow = c 81:* rwm

# Framebuffer devices (major 29)
lxc.cgroup2.devices.allow = c 29:* rwm

# USB devices (major 189) - for USB passthrough
lxc.cgroup2.devices.allow = c 189:* rwm

# KVM device (major 10, minor 232) - for hardware virtualization
lxc.cgroup2.devices.allow = c 10:232 rwm

# Network devices - TUN/TAP (major 10, minor 200) - for Docker/Kubernetes networking
lxc.cgroup2.devices.allow = c 10:200 rwm

# =============================================================================
# MOUNT ENTRIES
# =============================================================================

# Mount entries - sys:rw is required for udev to work
# proc:mixed gives a restricted /proc at boot; nix-daemon's preStart remounts
# it as a full procfs so Nix sandbox can detect kernel namespace support.
# Using proc:rw here would make the remount a no-op and break sandboxing.
lxc.mount.auto = cgroup:mixed proc:mixed sys:rw
lxc.mount.entry = /sys/fs/fuse/connections sys/fs/fuse/connections none bind,optional 0 0

# GPU passthrough
lxc.mount.entry = /dev/dri dev/dri none bind,optional,create=dir 0 0

# Input devices passthrough
lxc.mount.entry = /dev/input dev/input none bind,optional,create=dir 0 0

# Network devices (TUN/TAP)
lxc.mount.entry = /dev/net dev/net none bind,optional,create=dir 0 0

# KVM passthrough (hardware virtualization)
lxc.mount.entry = /dev/kvm dev/kvm none bind,optional,create=file 0 0

# TTY for direct VT access (sway/Wayland)
lxc.mount.entry = /dev/tty0 dev/tty0 none bind,optional,create=file 0 0
lxc.mount.entry = /dev/tty7 dev/tty7 none bind,create=file 0 0

# Sound devices passthrough
lxc.mount.entry = /dev/snd dev/snd none bind,optional,create=dir 0 0

# Webcam passthrough (up to 8 video devices)
lxc.mount.entry = /dev/video0 dev/video0 none bind,optional,create=file 0 0
lxc.mount.entry = /dev/video1 dev/video1 none bind,optional,create=file 0 0
lxc.mount.entry = /dev/video2 dev/video2 none bind,optional,create=file 0 0
lxc.mount.entry = /dev/video3 dev/video3 none bind,optional,create=file 0 0
lxc.mount.entry = /dev/video4 dev/video4 none bind,optional,create=file 0 0
lxc.mount.entry = /dev/video5 dev/video5 none bind,optional,create=file 0 0
lxc.mount.entry = /dev/video6 dev/video6 none bind,optional,create=file 0 0
lxc.mount.entry = /dev/video7 dev/video7 none bind,optional,create=file 0 0

# Framebuffer (if exists)
lxc.mount.entry = /dev/fb0 dev/fb0 none bind,optional,create=file 0 0

# Kernel message buffer (required by Kubernetes kubelet)
lxc.mount.entry = /dev/kmsg dev/kmsg none bind,optional,create=file 0 0

# =============================================================================
# SECURITY
# =============================================================================

# AppArmor profile (use unconfined for full device access)
lxc.apparmor.profile = unconfined

# Hook to fix device permissions inside container
lxc.hook.mount = /var/lib/lxc/nixos/mount-hook.sh
